# Конфиг Alembic. sqlalchemy.url намеренно ПУСТ — реальный URL подставляется в
# migrations/env.py из DATABASE_URL (.env), чтобы секреты не лежали в репозитории.

[alembic]
script_location = migrations
prepend_sys_path = .
# имя файла ревизии: ГГГГММДД_ЧЧММ_<rev>_<slug>
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
