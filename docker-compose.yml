# Локальный Postgres для разработки. Поднять: docker compose up -d
# Данные сохраняются в именованном томе corridor_pgdata (переживают рестарт).
services:
  db:
    image: postgres:16
    container_name: corridor_pg
    environment:
      POSTGRES_USER: corridor
      POSTGRES_PASSWORD: corridor
      POSTGRES_DB: corridor
    ports:
      - "5432:5432"
    volumes:
      - corridor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corridor -d corridor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  corridor_pgdata:
